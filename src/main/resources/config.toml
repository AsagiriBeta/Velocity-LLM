# Velocity LLM 配置文件

[ai]
enabled = true
# Ollama 服务地址（不含 /api/chat 路径）
base-url = "http://127.0.0.1:11434"
model = "llama3"
api-key = ""
# API 风格: ollama | openai
api-style = "ollama"
# Ollama 下使用 /api/chat（true）或 /api/generate（false）
use-chat-api = true
temperature = 0.7
timeout-seconds = 120

[chat]
trigger-enabled = true
trigger-prefixes = ["@ai", "@bot"]
cooldown-seconds = 5
# 保留的对话轮数（多轮 @ai 对话上下文）
max-history = 3

[rag]
enabled = true
docs-folder = "docs"
max-chunks = 3
chunk-size = 600
chunk-overlap = 100
# Ollama embedding 模型（需 ollama pull nomic-embed-text）
embedding-model = "nomic-embed-text"
# 余弦相似度阈值（0~1）
min-score = 0.25

[response]
max-length = 500
# 对话可见范围: same-server（同子服所有玩家）| private（仅对话发起者）
visibility = "same-server"
# 是否显示玩家发送给 AI 的消息（同子服或私密模式下的对话记录）
show-player-messages = true
system-prompt = """你是本 Minecraft 服务器的 AI 向导。请根据提供的【服务器文档】和对话历史回复玩家。
规则：
1. 优先依据【服务器文档】作答；文档中没有的信息请明确说明"文档中未提及"，不要编造。
2. 回答简洁清晰，适合游戏内聊天阅读。
3. 使用简体中文回答。"""

[messages]
prefix = "<gradient:#55aaff:#aa55ff>[AI]</gradient> "
thinking = "<gray>正在思考中，请稍候...</gray>"
cooldown = "<red>对话太频繁，请等待 {seconds} 秒后再试。</red>"
empty-input = "<red>请输入你想说的话。</red>"
error = "<red>AI 请求失败：{error}</red>"
disabled = "<red>AI 助手当前已禁用。</red>"
