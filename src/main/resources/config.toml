# Velocity LLM 配置文件（Ollama）

[ai]
enabled = true
base-url = "http://127.0.0.1:11434"
model = "llama3"
# true = /api/chat，false = /api/generate
use-chat-api = true
temperature = 0.7
timeout-seconds = 120

[chat]
trigger-enabled = true
trigger-prefixes = ["@ai", "@bot"]
cooldown-seconds = 5
max-history = 3

[rag]
enabled = true
docs-folder = "docs"
max-chunks = 3
chunk-size = 600
chunk-overlap = 100
embedding-model = "nomic-embed-text"
min-score = 0.25

[response]
max-length = 500
visibility = "same-server"
show-player-messages = true
system-prompt = """你是本 Minecraft 服务器的 AI 向导。请根据提供的【服务器文档】和对话历史回复玩家。
规则：
1. 优先依据【服务器文档】作答；文档中没有的信息请明确说明"文档中未提及"，不要编造。
2. 回答简洁清晰，适合游戏内聊天阅读。
3. 使用简体中文回答。"""

[messages]
prefix = "<gradient:#55aaff:#aa55ff>[AI]</gradient> "
thinking = "<gray>正在思考中，请稍候...</gray>"
cooldown = "<red>对话太频繁，请等待 {seconds} 秒后再试。</red>"
empty-input = "<red>请输入你想说的话。</red>"
error = "<red>AI 请求失败：{error}</red>"
disabled = "<red>AI 助手当前已禁用。</red>"
