name: Release

# 仅在代码进入 main 时触发（PR merge 后 push 到 main）
# push 到其他分支、PR 打开/更新均不触发
on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' build.gradle | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/")
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Verify JAR exists
        run: |
          JAR="build/libs/velocity-llm-${{ steps.version.outputs.value }}.jar"
          test -f "$JAR"
          ls -lh "$JAR"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-llm-${{ steps.version.outputs.value }}
          path: build/libs/velocity-llm-${{ steps.version.outputs.value }}.jar
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          TAG="v${VERSION}"
          JAR="build/libs/velocity-llm-${VERSION}.jar"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} 已存在，更新 JAR 附件"
            gh release upload "$TAG" "$JAR" --clobber
          else
            echo "创建 Release ${TAG}"
            gh release create "$TAG" "$JAR" \
              --title "Velocity LLM ${TAG}" \
              --generate-notes
          fi
